<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ovation Link — Accès Sécurisé</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
  background:#F5F5F7;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  -webkit-font-smoothing:antialiased;
}
.card{
  background:#fff;border-radius:20px;
  box-shadow:0 8px 40px rgba(0,0,0,.10);
  padding:52px 44px;width:100%;max-width:380px;
  text-align:center;
}
.logo{font-size:22px;font-weight:700;color:#1D1D1F;letter-spacing:-.02em;margin-bottom:8px;}
.logo span{color:#0071E3;}
.subtitle{font-size:13px;color:#6E6E73;margin-bottom:36px;}
.lock{font-size:40px;margin-bottom:24px;display:block;}
label{display:block;text-align:left;font-size:12px;font-weight:600;color:#6E6E73;letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px;}
input[type=password]{
  width:100%;padding:13px 16px;font-size:16px;
  border:1.5px solid #D2D2D7;border-radius:12px;
  outline:none;font-family:inherit;letter-spacing:.1em;
  transition:border-color .2s,box-shadow .2s;
  background:#F5F5F7;color:#1D1D1F;
}
input[type=password]:focus{border-color:#0071E3;box-shadow:0 0 0 3px rgba(0,113,227,.12);background:#fff;}
button{
  width:100%;margin-top:16px;padding:14px;
  background:#0071E3;color:#fff;border:none;border-radius:12px;
  font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;
  transition:background .2s,transform .1s;
}
button:hover{background:#0077ED;transform:translateY(-1px);}
button:active{transform:translateY(0);}
.error{
  color:#FF3B30;font-size:13px;margin-top:14px;
  display:none;background:#FFF0EF;border-radius:8px;padding:8px 12px;
}
.error.show{display:block;}
.footer{margin-top:32px;font-size:11px;color:#AEAEB2;}
</style>
</head>
<body>
<div class="card">
  <span class="lock">🔒</span>
  <div class="logo">Ovation <span>Link</span></div>
  <div class="subtitle">Document confidentiel · Accès restreint</div>
  <label for="pwd">Mot de passe</label>
  <input type="password" id="pwd" placeholder="••••••••" autofocus onkeydown="if(event.key==='Enter')check()">
  <button onclick="check()">Accéder →</button>
  <div class="error" id="err">Mot de passe incorrect. Veuillez réessayer.</div>
  <div class="footer">© 2026 Ovation Link · Confidentiel investisseurs</div>
</div>

<script>
function check(){
  const pwd = document.getElementById('pwd').value.trim().toUpperCase();
  if(pwd === 'NAPO'){
    sessionStorage.setItem('ol_auth','1');
    window.location.href = 'simulateur.html';
  } else {
    const err = document.getElementById('err');
    err.classList.add('show');
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
    setTimeout(()=>err.classList.remove('show'), 3000);
  }
}
// Si déjà authentifié, rediriger directement
if(sessionStorage.getItem('ol_auth')==='1'){
  window.location.href='simulateur.html';
}
</script>
</body>
</html>
